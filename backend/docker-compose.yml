version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: tomoya-backend-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-tomoya}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-tomoya}
      MYSQL_USER: ${DB_USERNAME:-tomoya}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tomoya-backend-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DB_HOST untuk menggunakan service name MySQL di Docker
      DB_HOST: mysql
      DB_PORT: 3306
      # Jika APP_URL tidak di set di .env, gunakan default
      APP_URL: ${APP_URL:-http://localhost:8080}
      # Pastikan menggunakan MySQL
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

  web:
    image: nginx:1.25-alpine
    container_name: tomoya-backend-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  mysql_data:
    driver: local


